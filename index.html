<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Text Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
      --accent: #00ff88; --danger: #ff4d6d; --text: #e8e8f0; --muted: #555570;
    }
    body {
      background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 60px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .container { width: 100%; max-width: 720px; position: relative; z-index: 1; }
    header { margin-bottom: 48px; text-align: center; }
    .tag {
      display: inline-block; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); border: 1px solid var(--accent); padding: 3px 10px; margin-bottom: 16px;
    }
    h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    h1 span { color: var(--accent); }
    .subtitle { margin-top: 12px; color: var(--muted); font-size: 12px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 28px; margin-bottom: 20px; }
    .label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    textarea {
      width: 100%; min-height: 180px; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: 'Space Mono', monospace; font-size: 13px; line-height: 1.7;
      padding: 14px; resize: vertical; outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    .word-count { text-align: right; font-size: 11px; color: var(--muted); margin-top: 8px; }
    button {
      width: 100%; padding: 16px; background: var(--accent); color: #000; border: none;
      font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-top: 16px;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #result { display: none; }
    #result.show { display: block; }
    .verdict { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 20px; }
    .verdict.ai { color: var(--danger); }
    .verdict.human { color: var(--accent); }
    .bar-track { width: 100%; height: 6px; background: var(--border); overflow: hidden; margin-bottom: 20px; }
    .bar-fill { height: 100%; width: 0%; transition: width 1s ease; }
    .bar-fill.ai { background: var(--danger); }
    .bar-fill.human { background: var(--accent); }
    .scores { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .score-box { background: var(--bg); border: 1px solid var(--border); padding: 14px; }
    .score-box .s-label { font-size: 10px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .score-box .s-value { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; }
    .score-box.ai .s-value { color: var(--danger); }
    .score-box.human .s-value { color: var(--accent); }
    .disclaimer { margin-top: 20px; padding: 12px 14px; border-left: 2px solid var(--muted); font-size: 11px; color: var(--muted); line-height: 1.6; }
    .error-msg { color: var(--danger); font-size: 12px; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="tag">Forensic Analysis Tool</div>
      <h1>AI Text<br/><span>Detector</span></h1>
      <p class="subtitle">Powered by RoBERTa · OpenAI Community · HuggingFace</p>
    </header>
    <div class="card">
      <div class="label">// Input Text</div>
      <textarea id="input" placeholder="Paste text here. 150+ words gives more reliable results..."></textarea>
      <div class="word-count"><span id="wc">0</span> words</div>
      <div class="error-msg" id="error"></div>
      <button id="btn" onclick="analyse()">Run Analysis</button>
    </div>
    <div class="card" id="result">
      <div class="label">// Verdict</div>
      <div class="verdict" id="verdict-text"></div>
      <div class="label">// Confidence</div>
      <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
      <div class="scores">
        <div class="score-box ai"><div class="s-label">AI Generated</div><div class="s-value" id="ai-score">-</div></div>
        <div class="score-box human"><div class="s-label">Human Written</div><div class="s-value" id="human-score">-</div></div>
      </div>
      <div class="disclaimer">Trained on GPT-2 era text. Accuracy is lower on GPT-4/Claude. Use as a signal, not a verdict.</div>
    </div>
  </div>
  <script>
    document.getElementById('input').addEventListener('input', function() {
      document.getElementById('wc').textContent = this.value.trim().split(/\s+/).filter(Boolean).length;
    });
    async function analyse() {
      var text = document.getElementById('input').value.trim();
      var errEl = document.getElementById('error');
      errEl.style.display = 'none';
      if (!text || text.split(/\s+/).length < 20) {
        errEl.textContent = 'Please enter at least 20 words.';
        errEl.style.display = 'block';
        return;
      }
      var btn = document.getElementById('btn');
      btn.disabled = true; btn.textContent = 'Analysing...';
      document.getElementById('result').classList.remove('show');
      try {
        var res = await fetch('/detect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text })
        });
        var data = await res.json();
        if (data.error) throw new Error(data.error);
        var isAI = (data.ai || 0) > (data.human || 0);
        document.getElementById('verdict-text').textContent = isAI ? 'Likely AI-Generated' : 'Likely Human-Written';
        document.getElementById('verdict-text').className = 'verdict ' + (isAI ? 'ai' : 'human');
        document.getElementById('ai-score').textContent = ((data.ai || 0) * 100).toFixed(1) + '%';
        document.getElementById('human-score').textContent = ((data.human || 0) * 100).toFixed(1) + '%';
        var bar = document.getElementById('bar');
        bar.className = 'bar-fill ' + (isAI ? 'ai' : 'human');
        document.getElementById('result').classList.add('show');
        setTimeout(function() { bar.style.width = (Math.max(data.ai||0, data.human||0)*100) + '%'; }, 100);
      } catch(err) {
        errEl.textContent = 'Error: ' + (err.message || 'Something went wrong.');
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'Run Analysis';
      }
    }
  </script>
</body>
</html>
